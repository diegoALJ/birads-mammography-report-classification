project:
  name: "birads-mammography-report-classification"
  type: "kaggle-clinical-nlp"
  language: "portuguese"
  task: "multiclass-text-classification"

general:
  seed: 42
  device: "auto"
  print_freq: 100
  num_workers: 2
  use_amp: true
  debug: false
  verbose: true

paths:
  competition_dir: "data"
  train_csv: "data/train.csv"
  test_csv: "data/test.csv"

  output_dir: "results"
  model_dir: "results/models"
  oof_dir: "results/oof"
  submission_dir: "results/submissions"
  cache_dir: "results/cache"

data:
  target_col: "target"
  text_col: "report"
  id_col: "ID"
  n_classes: 7

  leakage_ids: []
  remove_leakage: true
  save_cleaned_csv: true

cv:
  n_folds: 5
  selected_folds: [0, 1, 2, 3, 4]
  splitter: "StratifiedKFold"

text:
  model_name: "pucpr/biobertpt-clin"
  local_model_path: null
  max_length: 256
  padding: "max_length"
  truncation: true

  use_text_preprocessing: false
  text_version: "raw"

training:
  epochs: 12
  train_bs: 16
  valid_bs: 32

  lr: 0.000015
  encoder_lr: 0.000015
  decoder_lr: 0.000015
  weight_decay: 0.01
  max_grad_norm: 1000

  gradient_accumulation_steps: 2
  warmup_ratio: 0.1
  scheduler: "cosine"

model:
  dropout: 0.2
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1

loss:
  use_class_weights: false
  use_focal_loss: true
  label_smoothing: 0.05
  focal_gamma: 2.0

early_stopping:
  use_early_stopping: true
  patience: 3
  min_delta: 0.005

inference:
  save_logits: true
  save_probabilities: true
  ensemble_method: "mean"
